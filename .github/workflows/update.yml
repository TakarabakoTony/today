name: Update redirect to latest note article

on:
  schedule:
    # 毎日 日本時間 7:00 / 12:00 / 19:00 (UTCで指定)
    - cron: "0 22 * * *"
    - cron: "0 3 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update index.html
        run: python update_redirect.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update redirect to latest article"
          git push
